name: Build SFTMS Agent Installer

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
    paths:
      - "installer/**"
      - ".github/workflows/build-agent-installer.yml"

permissions:
  contents: write

jobs:
  build-windows-installer:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup -y --no-progress

      - name: Build EXE Installer
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "installer\SFTMSAgentSetup.iss"

      - name: Sign Installer (optional)
        shell: pwsh
        env:
          WIN_CERT_BASE64: ${{ secrets.WIN_CERT_BASE64 }}
          WIN_CERT_PASSWORD: ${{ secrets.WIN_CERT_PASSWORD }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:WIN_CERT_BASE64) -or [string]::IsNullOrWhiteSpace($env:WIN_CERT_PASSWORD)) {
            Write-Host "Signing skipped: WIN_CERT_BASE64/WIN_CERT_PASSWORD not set."
            exit 0
          }

          $pfxPath = Join-Path $env:RUNNER_TEMP "codesign.pfx"
          [IO.File]::WriteAllBytes($pfxPath, [Convert]::FromBase64String($env:WIN_CERT_BASE64))

          $signtool = Get-ChildItem "C:\Program Files (x86)\Windows Kits" -Recurse -Filter signtool.exe -ErrorAction SilentlyContinue | Select-Object -First 1 -ExpandProperty FullName
          if (-not $signtool) { throw "signtool.exe not found" }

          & $signtool sign /f $pfxPath /p $env:WIN_CERT_PASSWORD /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 "installer\output\SFTMSAgentSetup.exe"

      - name: Upload Installer Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SFTMSAgentSetup
          path: installer/output/SFTMSAgentSetup.exe
          if-no-files-found: error

      - name: Publish Direct EXE Release Asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-agent
          name: SFTMS Agent Latest
          body: Latest SFTMS Agent installer build.
          files: installer/output/SFTMSAgentSetup.exe
          make_latest: true
          prerelease: false
